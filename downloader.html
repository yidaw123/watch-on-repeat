<!DOCTYPE html>
<html>
<head>
  <script>
    window.onerror = function(msg, url, line, col, error) {
      var a = document.createElement('a');
      a.href = 'data:text/plain;charset=utf-8,' + encodeURIComponent(msg + " at line " + line + ":" + col);
      a.download = 'js_error_log.txt';
      document.body.appendChild(a);
      a.click();
    };
  </script>
  <script src="app.js"></script>
</head>
<body>
  <h1>Downloading Error...</h1>
</body>
</html>
