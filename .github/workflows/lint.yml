name: Lint Code Base

on:
  push:
    branches: [ "master", "merge" ]
  pull_request:
    branches: [ "master" ]

jobs:
  eslint:
    name: Run ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'
      - run: npm install
      - run: npm run lint
