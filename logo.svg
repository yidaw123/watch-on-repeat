<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 60" width="100%" height="100%">
  <defs>
    <!-- Cyan to Magenta Gradient -->
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" /> <!-- Cyan -->
      <stop offset="50%" stop-color="#8b5cf6" /> <!-- Violet -->
      <stop offset="100%" stop-color="#ec4899" /> <!-- Pink -->
    </linearGradient>
    
    <!-- Soft Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#neonGlow)">
    <!-- Infinity Loop Shape -->
    <path 
      d="M 50 30 C 35 10, 15 15, 15 30 C 15 45, 35 50, 50 30 C 65 10, 85 15, 85 30 C 85 45, 65 50, 50 30 Z" 
      fill="none" 
      stroke="url(#neonGradient)" 
      stroke-width="6" 
      stroke-linecap="round" 
      stroke-linejoin="round"
    />
    
    <!-- Play Button embedded in the center of the right loop -->
    <path 
      d="M 64 24 L 64 36 L 74 30 Z" 
      fill="url(#neonGradient)" 
      stroke="url(#neonGradient)"
      stroke-width="2"
      stroke-linejoin="round"
    />
  </g>
</svg>
