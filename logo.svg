<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Cyan to Pink Gradient -->
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#fe0979" />
    </linearGradient>

    <!-- Hot Core Gradient -->
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#fdf4ff" />
    </linearGradient>

    <!-- Heavy Glow -->
    <filter id="heavyGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
      </feMerge>
    </filter>

    <!-- Medium Glow -->
    <filter id="mediumGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Transform to center the 60px height shape into the 100px square viewBox -->
  <g transform="translate(0, 20)">
    
    <!-- 1. Deep Background Glow (Heavy Blur) -->
    <path 
      d="M 50 30 C 35 10, 15 15, 15 30 C 15 45, 35 50, 50 30 C 65 10, 85 15, 85 30 C 85 45, 65 50, 50 30 Z" 
      fill="none" stroke="url(#neonGrad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"
      filter="url(#heavyGlow)" opacity="0.8"
    />
    
    <!-- 2. Inner Glow Tube (Medium Blur) -->
    <path 
      d="M 50 30 C 35 10, 15 15, 15 30 C 15 45, 35 50, 50 30 C 65 10, 85 15, 85 30 C 85 45, 65 50, 50 30 Z" 
      fill="none" stroke="url(#neonGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"
      filter="url(#mediumGlow)"
    />

    <!-- 3. Hot Core (Thin Solid White Line) -->
    <path 
      d="M 50 30 C 35 10, 15 15, 15 30 C 15 45, 35 50, 50 30 C 65 10, 85 15, 85 30 C 85 45, 65 50, 50 30 Z" 
      fill="none" stroke="url(#coreGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
    />
    
    <!-- Play Button Base Glow -->
    <path d="M 63 24 L 63 36 L 73 30 Z" fill="url(#neonGrad)" filter="url(#heavyGlow)"/>
    
    <!-- Play Button Core -->
    <path d="M 63 24 L 63 36 L 73 30 Z" fill="#ffffff" filter="url(#mediumGlow)"/>
    
  </g>
</svg>
